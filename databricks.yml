# Databricks Asset Bundle for Bank Audit Analyst app.
# Replaces app.yaml: app config (command, env, secret resource) is defined here.
# Deploy: databricks bundle deploy -t prod | -t preview -v app_name=... -v secret_key=...
#
# Variables (set per target or pass via -v):
#   databricks_host   — workspace URL (e.g. https://xxx.cloud.databricks.com)
#   workspace_user   — workspace user path segment for root_path (e.g. 12345@databricks)
#   app_name         — app name (prod: bank-audit-analyst; preview: bank-audit-analyst-<env>)
#   secret_key       — secret key in scope bank-audit-app (prod: database-url-prod; preview: database-url-<env>)
#   sql_warehouse_id — resolved from warehouse named 00vsdb (see variables.sql_warehouse_id.lookup)
#   bank_statements_volume_name — UC three-part volume name for statement files (default main.tsfrt.occ)
#   bank_supervision_agent_endpoint — model serving endpoint name for on-demand bank supervision (KA)

bundle:
  name: bank-audit-analyst-bundle

variables:
  databricks_host:
    description: Databricks workspace host URL
  workspace_user:
    description: Workspace user segment for bundle root path (e.g. user@example.com or 12345@databricks)
  app_name:
    description: App name in the workspace
    default: bank-audit-analyst
  secret_key:
    description: Secret key in scope bank-audit-app for DATABASE_URL
    default: database-url-prod
  # For preview: unique ID (e.g. pr-5) so multiple previews can coexist; pass via --var preview_id=pr-5
  preview_id:
    description: Preview deployment ID for root_path isolation (e.g. pr-5)
    default: preview
  sql_warehouse_id:
    description: SQL warehouse ID for document queries (resolved from warehouse name at deploy)
    lookup:
      warehouse: "00vsdb"
  bank_statements_volume_name:
    description: Unity Catalog volume for bank statement files (catalog.schema.volume)
    default: main.tsfrt.occ
  bank_supervision_agent_endpoint:
    description: Serving endpoint name for bank supervision document review (OAuth invocations)
    default: ka-728916cd-endpoint

resources:
  apps:
    bank_audit_analyst:
      name: ${var.app_name}
      source_code_path: .
      description: Bank Audit Analyst UI (Office of the Comptroller)
      config:
        command:
          - sh
          - -c
          - "npm ci && npm run build && npm run start"
        env:
          - name: DATABASE_URL
            value_from: database_url
          - name: LAKEBASE_DATABASE_URL
            value_from: database_url
          - name: DATABRICKS_SQL_WAREHOUSE_ID
            value_from: sql_warehouse
          - name: BANK_STATEMENTS_VOLUME_BASE_PATH
            value_from: bank_statements_volume
          - name: DATABRICKS_HOST
            value: "${var.databricks_host}"
          - name: BANK_SUPERVISION_AGENT_ENDPOINT
            value: "${var.bank_supervision_agent_endpoint}"
          - name: DATABRICKS_CLIENT_ID
            value_from: databricks_oauth_client_id
          - name: DATABRICKS_CLIENT_SECRET
            value_from: databricks_oauth_client_secret
      resources:
        - name: database_url
          secret:
            scope: bank-audit-app
            key: ${var.secret_key}
            permission: READ
        - name: sql_warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: bank_statements_volume
          uc_securable:
            securable_type: VOLUME
            securable_full_name: ${var.bank_statements_volume_name}
            permission: READ_VOLUME
        - name: databricks_oauth_client_id
          secret:
            scope: bank-audit-app
            key: databricks-oauth-client-id
            permission: READ
        - name: databricks_oauth_client_secret
          secret:
            scope: bank-audit-app
            key: databricks-oauth-client-secret
            permission: READ

targets:
  prod:
    mode: production
    variables:
      app_name: bank-audit-analyst
      secret_key: database-url-prod
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com/
      # root_path: where bundle deploys app source in the workspace
      root_path: /Workspace/Users/${var.workspace_user}/.bundle/${bundle.name}/${bundle.target}

  preview:
    mode: development
    # app_name, secret_key, preview_id passed via -v from workflow (preview_id = pr-5 for PRs)
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com/
      # root_path per preview_id so multiple previews coexist (e.g. .../preview/pr-5)
      root_path: /Workspace/Users/${var.workspace_user}/.bundle/${bundle.name}/${bundle.target}/${var.preview_id}
