# Databricks Asset Bundle - Bank Audit Analyst UI
# https://docs.databricks.com/en/dev-tools/bundles/
# Lakebase project/branches/endpoints are created via CLI in CI (see scripts/lakebase-feature-branch.sh)
#
# Workspace host: variable interpolation is not supported for workspace.host.
# Set DATABRICKS_HOST (and DATABRICKS_TOKEN) in the environment at runtime; the CLI uses them.

bundle:
  name: bank_audit_analyst

resources:
  apps:
    bank_audit_analyst_app:
      name: bank-audit-analyst
      source_code_path: .
      description: Office of the Comptroller - Bank Audit Analyst UI (Next.js)
      # Run command is defined in app.yaml at project root

targets:
  dev:
    mode: development
    default: true
    workspace:
      # Override at runtime with DATABRICKS_HOST env var
      host: https://e2-demo-field-eng.cloud.databricks.com/

  preview:
    mode: development
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com/
    # Used by CI for feature-branch deployments; set DATABRICKS_HOST in workflow

  prod:
    mode: production
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com/
      root_path: /Workspace/.bundle/bank_audit_analyst/prod
    # Set DATABRICKS_HOST and DATABRICKS_TOKEN in CI secrets
