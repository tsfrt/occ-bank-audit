# Databricks App (no asset bundle). Deploy with: databricks apps deploy <app-name> --source-code-path .
# https://docs.databricks.com/en/dev-tools/databricks-apps/
# DATABASE_URL is set from a secret. Secret key is per deployment environment (e.g. database-url-prod, database-url-pr-5).
# In each app instance, add secret resource "database_url" → scope bank-audit-app, key database-url-<env>.

command:
  - sh
  - -c
  - "npm ci && npm run build && npm run start"

env:
  - name: DATABASE_URL
    valueFrom: database_url
