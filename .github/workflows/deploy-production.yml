# Deploy production when a version tag is pushed to main.
# Runs Prisma migrations, updates the app's DATABASE_URL secret, then deploys via the asset bundle.
# The bundle (databricks.yml) defines the app with secret resource and config (replaces app.yaml).
#
# Secrets: DATABRICKS_HOST, DATABRICKS_TOKEN, LAKEBASE_DATABASE_URL (or DATABASE_URL).
# Secret scope "bank-audit-app", key "database-url-prod" is set by this workflow and referenced in the bundle.

name: Deploy Production

on:
  push:
    tags:
      - "v*"

env:
  DEPLOYMENT_ENV: prod
  APP_NAME: bank-audit-analyst
  SECRET_SCOPE: bank-audit-app
  SECRET_KEY: database-url-prod

jobs:
  deploy-production:
    runs-on: self-hosted
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          LAKEBASE_DATABASE_URL: postgresql://localhost:5432/placeholder
        run: npx prisma generate

      - name: Validate database connectivity
        env:
          LAKEBASE_DATABASE_URL: ${{ secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
          DATABASE_URL: ${{ secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
        run: |
          echo "Checking database connectivity..."
          npx prisma migrate status
          echo "Database connection OK."

      - name: Run Prisma migrations (production)
        env:
          LAKEBASE_DATABASE_URL: ${{ secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
          DATABASE_URL: ${{ secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
          DEBUG: "prisma:*"
        run: |
          echo "Running Prisma migrate deploy..."
          npx prisma migrate deploy

      - name: Build Next.js app
        env:
          LAKEBASE_DATABASE_URL: ${{ secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
        run: npm run build

      - name: Create secret scope (if not exists)
        env:
          DB_URL: ${{ secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
        run: |
          databricks secrets create-scope ${{ env.SECRET_SCOPE }} 2>/dev/null || true

      - name: Set DATABASE_URL secret for app
        env:
          DB_URL: ${{ secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
        run: |
          printf '%s' "$DB_URL" | databricks secrets put-secret ${{ env.SECRET_SCOPE }} ${{ env.SECRET_KEY }}

      - name: Validate bundle
        run: |
          databricks bundle validate -t prod \
            -v databricks_host=${{ secrets.DATABRICKS_HOST }} \
            -v workspace_user=${{ vars.DATABRICKS_WORKSPACE_USER }}

      - name: Deploy app (production)
        run: |
          databricks bundle deploy -t prod \
            -v databricks_host=${{ secrets.DATABRICKS_HOST }} \
            -v workspace_user=${{ vars.DATABRICKS_WORKSPACE_USER }}
