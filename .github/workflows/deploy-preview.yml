# Deploy preview app for feature branches via the asset bundle.
# The bundle (databricks.yml) defines the app with secret resource and config; app_name and secret_key are passed per run.
# Vars: DATABRICKS_WORKSPACE_USER (workspace user path segment for bundle root_path).

name: Deploy Preview

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: "20"
  SECRET_SCOPE: bank-audit-app

jobs:
  deploy-preview:
    runs-on: self-hosted
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deployment environment
        id: env
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            DEPLOYMENT_ENV="pr-${{ github.event.pull_request.number }}"
          else
            DEPLOYMENT_ENV="${GITHUB_REF#refs/heads/}"
            DEPLOYMENT_ENV="${DEPLOYMENT_ENV//\//-}"
            DEPLOYMENT_ENV="${DEPLOYMENT_ENV//[^a-zA-Z0-9-]/}"
            [ -z "$DEPLOYMENT_ENV" ] && DEPLOYMENT_ENV=preview
          fi
          echo "deployment_env=${DEPLOYMENT_ENV}" >> $GITHUB_OUTPUT
          echo "app_name=bank-audit-analyst-${DEPLOYMENT_ENV}" >> $GITHUB_OUTPUT
          echo "secret_key=database-url-${DEPLOYMENT_ENV}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Create or reuse Lakebase branch and endpoint
        id: lakebase
        env:
          PROJECT_ID: ${{ vars.LAKEBASE_PROJECT_ID || secrets.LAKEBASE_PROJECT_ID }}
          PROD_BRANCH_ID: ${{ vars.LAKEBASE_PROD_BRANCH_ID || secrets.LAKEBASE_PROD_BRANCH_ID }}
        run: |
          BRANCH_ID="${{ github.event.pull_request.number }}"
          if [ -z "$BRANCH_ID" ]; then
            BRANCH_ID="${GITHUB_REF#refs/heads/}"
          else
            BRANCH_ID="pr-${BRANCH_ID}"
          fi
          BRANCH_ID="${BRANCH_ID//\//-}"
          BRANCH_ID="${BRANCH_ID//[^a-zA-Z0-9-]/}"
          [ -z "$BRANCH_ID" ] && BRANCH_ID="preview"
          echo "branch_id=${BRANCH_ID}" >> $GITHUB_OUTPUT
          ./scripts/lakebase-feature-branch.sh "$PROJECT_ID" "$PROD_BRANCH_ID" "$BRANCH_ID" || true
          echo "branch_resource=projects/$PROJECT_ID/branches/$BRANCH_ID" >> $GITHUB_OUTPUT

      - name: Resolve Lakebase DB URL for preview
        id: db_url
        run: |
          # Output 1 if any DB URL secret is set (for conditional migrate); do not echo URL
          if [ -n "${{ secrets.PREVIEW_DATABASE_URL }}" ] || [ -n "${{ secrets.LAKEBASE_DATABASE_URL }}" ] || [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "configured=1" >> $GITHUB_OUTPUT
          else
            echo "configured=0" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          LAKEBASE_DATABASE_URL: postgresql://localhost:5432/placeholder
        run: npx prisma generate

      - name: Run Prisma migrations (preview DB)
        if: steps.db_url.outputs.configured == '1'
        env:
          # Pass URL from secrets only (avoid step output encoding/limits)
          LAKEBASE_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL || secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
          DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL || secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
          DEBUG: "prisma:*"
        run: |
          echo "Database URL is set, running Prisma migrate deploy..."
          npx prisma migrate deploy
        continue-on-error: true

      - name: Skip Prisma migrations (no DB URL)
        if: steps.db_url.outputs.configured != '1'
        run: echo "Skipping Prisma migrate deploy: no PREVIEW_DATABASE_URL, LAKEBASE_DATABASE_URL, or DATABASE_URL secret set."

      - name: Build Next.js app
        env:
          LAKEBASE_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL || secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
          DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL || secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
        run: npm run build
        continue-on-error: true

      - name: Create secret scope (if not exists)
        run: |
          (cd /tmp && databricks secrets create-scope ${{ env.SECRET_SCOPE }} 2>/dev/null) || true

      - name: Set DATABASE_URL secret for app
        env:
          DB_URL: ${{ secrets.PREVIEW_DATABASE_URL || secrets.LAKEBASE_DATABASE_URL || secrets.DATABASE_URL }}
        run: |
          if [ -n "$DB_URL" ]; then
            (cd /tmp && printf '%s' "$DB_URL" | databricks secrets put-secret ${{ env.SECRET_SCOPE }} ${{ steps.env.outputs.secret_key }})
          fi
        continue-on-error: true

      - name: Validate bundle
        run: |
          databricks bundle validate -t preview \
            --var databricks_host=${{ secrets.DATABRICKS_HOST }} \
            --var workspace_user=${{ vars.DATABRICKS_WORKSPACE_USER }} \
            --var app_name=${{ steps.env.outputs.app_name }} \
            --var secret_key=${{ steps.env.outputs.secret_key }}
        continue-on-error: true

      - name: Deploy app (preview)
        run: |
          databricks bundle deploy -t preview \
            --var databricks_host=${{ secrets.DATABRICKS_HOST }} \
            --var workspace_user=${{ vars.DATABRICKS_WORKSPACE_USER }} \
            --var app_name=${{ steps.env.outputs.app_name }} \
            --var secret_key=${{ steps.env.outputs.secret_key }}
        continue-on-error: true

      - name: Sync app source to workspace (preview)
        id: sync
        env:
          WORKSPACE_USER: ${{ vars.DATABRICKS_WORKSPACE_USER }}
        run: |
          SOURCE_PATH="/Users/${WORKSPACE_USER}/apps/bank-audit-analyst/${{ steps.env.outputs.deployment_env }}"
          databricks sync . "$SOURCE_PATH" --full --exclude-from .gitignore
          echo "source_code_path=$SOURCE_PATH" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Deploy app source (set source code path) (preview)
        run: |
          (cd /tmp && databricks apps deploy ${{ steps.env.outputs.app_name }} --source-code-path "${{ steps.sync.outputs.source_code_path }}")
        continue-on-error: true

      - name: Deploy app source and start app (bundle run, preview)
        run: |
          databricks bundle run bank_audit_analyst -t preview \
            --var databricks_host=${{ secrets.DATABRICKS_HOST }} \
            --var workspace_user=${{ vars.DATABRICKS_WORKSPACE_USER }} \
            --var app_name=${{ steps.env.outputs.app_name }} \
            --var secret_key=${{ steps.env.outputs.secret_key }}
        continue-on-error: true
